# KIT Dashboard Onboarding Agent — Configuration
# All runtime defaults live here. No hard-coded values in code.
# Override anything via environment variables (see .env.example).

kit_dashboard:
  base_url: https://kitdashboard.com
  login_path: /site/login
  campaign_search_path: /boarding/campaign/search
  application_list_path: /boarding/default/index
  application_modify_path: /boarding/default/modify
  attachment_upload_path: /attachment/upload
  attachment_add_path: /boarding/attachment/add
  attachment_modify_path: /boarding/attachment/modify
  attachment_list_path: /boarding/attachment/list
  attachment_grouped_path: /boarding/attachment/get-grouped-attachments
  upload_token_path: /boarding/default/get-upload-token
  zip_search_path: /zip/search
  zip_city_path: /zip/city
  mcc_search_path: /system/mcc/search
  business_owner_new_path: /boarding/business-owner/get-new

  # HTTP headers sent with every API request
  default_headers:
    X-Requested-With: XMLHttpRequest
    Accept: application/json, text/plain, */*

  # Max retries per API call before giving up
  max_retries: 3
  retry_delay_seconds: 2
  request_timeout_seconds: 30

# Campaign to use when creating new applications
campaign:
  search_query: "KIT POS"
  target_name: "Kit POS InterCharge Plus"

# Step 6 — Deployment defaults
deployment:
  equipment: KIT POS
  equipment_provided_by: ISO

# Step 8 — DBA defaults
dba:
  same_as_legal: "No"
  building_type: Office Building
  ownership: Rent
  zoned: Commercial
  size_sqft: "500"  # minimum of 500-1500 range

# Step 9 — Principal defaults
principal:
  nationality: United States
  ownership_percent: 100
  # Title mapping by entity type
  title_by_entity:
    Corporation: CEO
    LLC: CEO
    Individual: Owner
    Partnership: Partner
    Government: Director
    Non-Profit: Director
    Publicly-Traded: CEO

# Step 11 — Payment Information defaults
payment:
  accept_cards: "No"
  monthly_volume: 50000
  average_ticket: 50
  max_ticket: 500
  cards_accepted:
    - Visa
    - MasterCard
    - Discover
    - Amex
    - PIN Debit
  default_industry: Grocery Store
  default_mcc_code: "5411"
  refund_policy: "No refund, no return"
  software: KITPOS

# Step 12 — Business Profile defaults
business_profile:
  seasonal: false
  customer_type_individual_pct: 100
  customer_location_local_pct: 100
  fulfillment_hours: 24

# Document categories for attachment upload
document_categories:
  voided_check: voided-check
  driver_license: driver-license
  bank_statement: bank-statement
  processing_statement: processing-statement
  corporation_documents: corporation-documents

