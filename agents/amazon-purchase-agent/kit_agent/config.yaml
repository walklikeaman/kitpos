# Extraction rules — what to look for in each document type
extraction:
  application_form:
    fields:
      - business_name_dba
      - legal_name
      - entity_type
      - business_address
      - city
      - state
      - zip
      - email
      - phone_owner          # From Owner's Information section specifically
      - ein                  # Federal Tax ID / EIN
      - ssn
      - dob
      - founded_date
      - refund_policy
      - industry

  driver_license:
    fields:
      - dl_number
      - dl_expiration
      - first_name
      - last_name
      - home_address         # Residential address — different from business
      - home_city
      - home_state
      - home_zip
      - dob                  # Cross-check with application

  voided_check:
    fields:
      - routing_number       # 9 digits — always from MICR line at bottom
      - account_number       # 10-12 digits — from MICR line
      - bank_name
    micr_line_instructions: |
      Read ONLY from the MICR line at the very bottom of the check.
      Format: ⑆ROUTING⑆ ACCOUNT ⑈ CHECK_NUMBER
      Routing = 9 digits between first two transit symbols.
      Account = digits between second transit symbol and check symbol.
      DO NOT read numbers from check header or body.

# Validation rules
validation:
  ein:
    digits: 9
    must_not_equal_ssn: true
  ssn:
    digits: 9
  routing_number:
    digits: 9
  account_number:
    min_digits: 8
    max_digits: 17
  phone:
    digits: 10
    format: "XXX-XXX-XXXX"
